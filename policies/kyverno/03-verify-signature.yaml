# Politique 3 — Exiger une signature cosign VALIDE de VOTRE identité.
# C'est le contrôle central : le cluster n'exécute que des images signées par vous.
#
# Deux variantes ci-dessous :
#   (A) mode PAR CLÉ    → collez votre cosign.pub (Lab 2)
#   (B) mode KEYLESS    → exigez l'identité du workflow GitHub (Lab 5)  [décommentez]
#
# ➜ Adaptez "ghcr.io/khalidouatik/scs-demo-app" et la clé / l'identité.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Vérifier la signature cosign
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/description: >-
      Refuse toute image non signée ou signée par une identité non autorisée.
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verifier-signature-cosign
      match:
        any:
          - resources:
              kinds: [Pod]
      verifyImages:
        - imageReferences:
            - "ghcr.io/khalidouatik/scs-demo-app*"
          mutateDigest: false
          verifyDigest: false
          required: true
          imageRegistryCredentials:
            secrets:
              - "kyverno/kyverno-registry-credentials"
            allowInsecureRegistry: false
          # ---- (A) VARIANTE PAR CLÉ ----
          attestors:
            - count: 1
              entries:
                - keys:
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAELZvgkuGC0OsdPnhVo1bCz5nccDW7
                      4zOMAqgCTrSeoRtY10XxY9Z37tqbfno00IBGsDvoKYhpE3xYK1nC716fuQ==
                      -----END PUBLIC KEY-----
          # ---- (B) VARIANTE KEYLESS (Lab 5) : commentez le bloc 'keys' ci-dessus
          #          et décommentez le bloc 'keyless' ci-dessous ----
          # attestors:
          #   - count: 1
          #     entries:
          #       - keyless:
          #           issuer: "https://token.actions.githubusercontent.com"
          #           subject: "https://github.com/KhalidOuatik/projet-technique/.github/workflows/supply-chain.yml@refs/heads/main"
          #           rekor:
          #             url: "https://rekor.sigstore.dev"
