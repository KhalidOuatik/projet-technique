# Déploiement de l'app — À DÉPLOYER PAR DIGEST (pas par tag).
# ➜ Remplacez l'image ci-dessous par VOTRE digest signé (sortie de `echo $DIGEST` au Lab 0/2).
#    ex : ghcr.io/<votre-user>/scs-demo-app@sha256:abcd1234...
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scs-demo-app
  namespace: app
  labels: { app: scs-demo-app }
spec:
  replicas: 2
  selector:
    matchLabels: { app: scs-demo-app }
  template:
    metadata:
      labels: { app: scs-demo-app }
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: app
          image: ghcr.io/khalidouatik/scs-demo-app@sha256:edf18d5cbdda8c97187310ba95a99dc33876293f7f18cce8c8a473000753fea1
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
          securityContext:
            runAsUser: 10001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: scs-demo-app
  namespace: app
spec:
  type: NodePort
  selector: { app: scs-demo-app }
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080     # mappé sur localhost:8080 par kind-config.yaml
